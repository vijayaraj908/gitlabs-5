<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitoring Dashboard</title>
    <style>
        /* Modern Dark Theme */
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 40px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 30px; color: #f1f5f9; }

        .dashboard { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 25px; 
            width: 100%; 
            max-width: 1000px; 
        }

        .card { 
            background-color: #1e293b; 
            border-radius: 12px; 
            padding: 25px; 
            text-align: center; 
            border: 1px solid #334155; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        h2 { 
            color: #38bdf8; 
            margin-top: 0; 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        .stat-box { 
            font-size: 2.5rem; 
            font-weight: bold; 
            margin-top: 10px; 
            color: #ffffff; 
        }
    </style>
</head>
<body>

    <h1>Server Monitoring Dashboard</h1>

    <div class="dashboard">
        <div class="card">
            <h2>CPU Usage</h2>
            <div class="stat-box"><span id="cpu">--</span>%</div>
        </div>
        <div class="card">
            <h2>Memory Usage</h2>
            <div class="stat-box"><span id="memory">--</span>%</div>
        </div>
        <div class="card">
            <h2>Disk Utilization</h2>
            <div class="stat-box"><span id="disk">--</span>%</div>
        </div>
        <div class="card">
            <h2>Nginx Status</h2>
            <div class="stat-box" id="nginx" style="font-size: 1.5rem; text-transform: capitalize;">--</div>
        </div>
    </div>

    <script>
        function updateStats() {
            fetch('/api/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('cpu').innerText = data.cpu;
                    document.getElementById('memory').innerText = data.memory;
                    document.getElementById('disk').innerText = data.disk;
                    document.getElementById('nginx').innerText = data.nginx;
                })
                .catch(err => console.log('Waiting for server data...'));
        }
        
        // Update every 3 seconds
        setInterval(updateStats, 3000);
        updateStats();
    </script>
</body>
</html>
