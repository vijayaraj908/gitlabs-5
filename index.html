<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Server Monitoring Dashboard</title>
    <style>
        /* Dark Mode CSS */
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { background-color: #1e293b; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-top: 0; }
        .stat-box { font-size: 2rem; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Server Monitoring Dashboard</h1>
    <div class="dashboard">
        <div class="card">
            <h2>CPU Usage</h2>
            <div class="stat-box"><span id="cpu">--</span>%</div>
        </div>
        <div class="card">
            <h2>Memory Usage</h2>
            <div class="stat-box"><span id="memory">--</span>%</div>
        </div>
    </div>
    <script>
        function updateStats() {
            fetch('/api/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('cpu').innerText = data.cpu;
                    document.getElementById('memory').innerText = data.memory;
                })
                .catch(err => console.log('Waiting for server...'));
        }
        setInterval(updateStats, 3000);
        updateStats();
    </script>
</body>
</html>
