<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Server Monitoring Dashboard</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; padding: 40px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        .card { background-color: #1e293b; border-radius: 12px; padding: 25px; text-align: center; border: 1px solid #334155; }
        h2 { color: #38bdf8; text-transform: uppercase; font-size: 1.1rem; }
        .stat-box { font-size: 3rem; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Server Monitoring Dashboard</h1>

    <div class="dashboard">
        <div class="card">
            <h2>CPU Usage</h2>
            <div class="stat-box"><span id="cpu">--</span>%</div>
        </div>
        <div class="card">
            <h2>Memory Usage</h2>
            <div class="stat-box"><span id="memory">--</span>%</div>
        </div>
        <div class="card">
            <h2>Disk Utilization</h2>
            <div class="stat-box"><span id="disk">--</span>%</div>
        </div>
    </div>

    <script>
        function updateStats() {
            fetch('/api/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('cpu').innerText = data.cpu;
                    document.getElementById('memory').innerText = data.memory;
                    document.getElementById('disk').innerText = data.disk;
                });
        }
        setInterval(updateStats, 3000);
        updateStats();
    </script>
</body>
</html>
